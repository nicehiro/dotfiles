bind = $mod, Return, exec, $terminal
bind = $mod, grave, togglespecialworkspace, terminal
bind = $mod SHIFT, grave, exec, ghostty --class ghostty-popup
bind = $mod, B, exec, $browser
bind = $mod, F, exec, $fileManager
bind = $mod, Space, exec, wofi --show drun
bind = $mod, Tab, exec, quickshell -p ~/.config/quickshell/current/QuickApps.qml
bind = $mod, R, exec, hyprctl reload
bind = $mod SHIFT, R, exec, ~/.config/quickshell/toggle-theme.sh
bind = $mod, W, killactive
bind = $mod, Backspace, killactive
bind = $mod, Escape, exec, hyprlock
bind = $mod SHIFT, Escape, exit

bind = $mod, J, togglesplit
bind = $mod, T, togglefloating
bind = $mod SHIFT, Plus, fullscreen

bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bind = $mod SHIFT, left, swapwindow, l
bind = $mod SHIFT, right, swapwindow, r
bind = $mod SHIFT, up, swapwindow, u
bind = $mod SHIFT, down, swapwindow, d

bind = $mod, minus, resizeactive, -100 0
bind = $mod, equal, resizeactive, 100 0
bind = $mod SHIFT, minus, resizeactive, 0 -100
bind = $mod SHIFT, equal, resizeactive, 0 100

bind = , PRINT, exec, hyprshot -m region
bind = SHIFT, PRINT, exec, hyprshot -m window
bind = CTRL, PRINT, exec, hyprshot -m output
bind = $mod, PRINT, exec, hyprpicker -a
bind = $mod, V, exec, quickshell -p ~/.config/quickshell/current/Clipboard.qml
bind = $mod SHIFT, V, exec, cliphist wipe && notify-send 'Clipboard history cleared'
bind = $mod SHIFT, C, exec, quickshell -p ~/.config/quickshell/current/Calendar.qml
bind = $mod SHIFT, M, exec, quickshell -p ~/.config/quickshell/current/Media.qml
bind = $mod SHIFT, N, exec, quickshell -p ~/.config/quickshell/current/Notifications.qml
bind = $mod SHIFT, S, exec, quickshell -p ~/.config/quickshell/current/ControlCenter.qml
bind = $mod SHIFT, P, exec, quickshell -p ~/.config/quickshell/current/PowerMenu.qml

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
