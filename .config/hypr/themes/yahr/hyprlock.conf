$wallpaper = ~/.config/quickshell/themes/yahr/wallpapers/eldritch.jpg

$fg = rgb(235, 250, 250)
$muted = rgb(200, 215, 240)
$panel = rgba(33, 35, 55, 0.82)
$purple = rgba(164, 140, 242, 0.95)
$pink = rgb(242, 101, 181)
$red = rgba(241, 108, 117, 0.95)
$green = rgba(55, 244, 153, 0.95)

general {
  disable_loading_bar = true
  hide_cursor = true
}

background {
  monitor =
  path = $wallpaper
  blur_passes = 3
  blur_size = 8
  brightness = 0.44
  contrast = 1.06
  vibrancy = 0.16
}

label {
  monitor =
  text = ☾
  color = rgba(164, 140, 242, 0.22)
  font_size = 180
  font_family = serif
  position = 0, 86
  halign = center
  valign = center
}

label {
  monitor =
  text = $TIME
  color = $fg
  font_size = 86
  font_family = Sen
  position = 0, 190
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:60000] date +"%A, %d %B"
  color = $muted
  font_size = 24
  font_family = Sen
  position = 0, 126
  halign = center
  valign = center
}

input-field {
  monitor =
  size = 440, 72
  position = 0, -44
  halign = center
  valign = center
  inner_color = $panel
  outer_color = $purple
  check_color = $green
  fail_color = $red
  font_color = $fg
  placeholder_text = Password
  fail_text = Access denied
  outline_thickness = 2
  rounding = 16
  dots_size = 0.24
  dots_spacing = 0.26
  fade_on_empty = false
}

label {
  monitor =
  text = cmd[update:300000] whoami
  color = $pink
  font_size = 20
  font_family = Sen
  position = 0, -112
  halign = center
  valign = center
}
